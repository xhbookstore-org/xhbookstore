# ============================================================
# API 模块 — 生产环境配置 (prod)
# 运行方式: java -jar xhbookstore-api.jar --spring.profiles.active=prod
#           mvn spring-boot:run -Dspring-boot.run.profiles=prod
# ============================================================

spring:
  datasource:
    druid:
      master:
        url: jdbc:mysql://${PROD_DB_HOST:bj-cynosdbmysql-grp-5hw57ofu.sql.tencentcdb.com}:${PROD_DB_PORT:26487}/${PROD_DB_NAME:xhbookstore}?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&characterSetResults=utf8mb4&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
        username: ${PROD_DB_USERNAME:root}
        password: ${PROD_DB_PASSWORD}
      initialSize: 20
      minIdle: 20
      maxActive: 200
      maxWait: 60000
      statViewServlet:
        enabled: false
      filter:
        stat:
          enabled: true
          log-slow-sql: true
          slow-sql-millis: 1000
  data:
    redis:
      host: localhost
      port: 6379
      password: ${PROD_REDIS_PASSWORD}
      database: 0
      timeout: 10s
      lettuce:
        pool:
          min-idle: 10
          max-idle: 50
          max-active: 100

# 安全配置（生产环境使用强密码）
security:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expire: 3600
    refresh-token-expire: 604800
  rate-limit:
    login-per-minute: 5
    write-per-minute: 30
    points-per-minute: 10

# 微信小程序（生产环境）
wechat:
  app-id: ${WECHAT_APP_ID:wx-prod-app-id}
  app-secret: ${WECHAT_APP_SECRET:prod-app-secret}
  token-cache-key: wechat:access_token
  token-expire-seconds: 7200
  token-refresh-ahead: 300

# 腾讯云COS（生产环境）
cos:
  secret-id: ${COS_SECRET_ID}
  secret-key: ${COS_SECRET_KEY}
  region: ${COS_REGION:ap-beijing}
  bucket: ${COS_BUCKET:xhbookstore-1305348572}
  base-url: ${COS_BASE_URL:https://img.cfxinhua.cn}
  max-file-size: 10485760

logging:
  level:
    com.xhbookstore.api: warn
    com.xhbookstore: warn
    org.springframework: error
