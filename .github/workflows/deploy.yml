name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        type: choice
        options: [staging, prod]
        default: staging

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'staging' }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare deployment
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      environment: ${{ steps.metadata.outputs.environment }}
    steps:
      - name: Generate deployment metadata
        id: metadata
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            environment="${{ inputs.environment }}"
          else
            environment="staging"
          fi
          timestamp="$(date +%Y%m%d_%H%M%S)"
          short_sha="${GITHUB_SHA::7}"
          echo "environment=$environment" >> "$GITHUB_OUTPUT"
          echo "version=v${timestamp}_${short_sha}_r${{ github.run_number }}" >> "$GITHUB_OUTPUT"

  deploy-staging:
    name: Build and deploy to staging
    needs: prepare
    if: needs.prepare.outputs.environment == 'staging'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: staging
      url: http://152.136.127.168
    steps:
      - name: Pull source, build and deploy on staging server
        uses: appleboy/ssh-action@v1.2.5
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          COMMIT_SHA: ${{ github.sha }}
        with:
          host: 152.136.127.168
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 18m
          envs: VERSION,COMMIT_SHA
          script: |
            DEPLOY_ENV=staging \
            bash /www/server/java/projects/source-deploy.sh staging "$VERSION" "$COMMIT_SHA"

  deploy-prod:
    name: Build and deploy to production
    needs: prepare
    if: needs.prepare.outputs.environment == 'prod'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: prod
      url: https://cfxinhua.cn
    steps:
      - name: Pull source, build and deploy on production server
        uses: appleboy/ssh-action@v1.2.5
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          COMMIT_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 18m
          envs: VERSION,COMMIT_SHA
          script: |
            DEPLOY_ENV=prod \
            bash /www/server/java/projects/source-deploy.sh prod "$VERSION" "$COMMIT_SHA"

      - name: Verify public endpoints
        run: |
          curl --fail --silent --show-error --retry 5 --retry-delay 3 --output /dev/null https://cfxinhua.cn/
          curl --fail --silent --show-error --retry 5 --retry-delay 3 --output /dev/null https://cfxinhua.cn/prod-api/getInfo
          curl --fail --silent --show-error --retry 5 --retry-delay 3 --output /dev/null https://cfxinhua.cn/api/mp/v1/stores
